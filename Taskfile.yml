# https://taskfile.dev
version: '3'
vars:
  BINFILE: mdtohtml
  IMG: sgaunet/mdtohtml:latest

tasks:
  default:
    desc: "List all tasks"
    cmds:
      - task -a

  lint:
    desc: "Run linter"
    cmds:
      - golangci-lint run

  build:
    desc: "Build the binary"
    cmds:
      - go mod tidy
      - go mod download
      - CGO_ENABLED=0 go build .

  integration:
    desc: "Run venom integration tests"
    deps: [build]
    cmds:
      - rm -rf $PWD/results
      - mkdir -p $PWD/results
      - >-
        venom run tst/integration/testsuite-*.yml
        --var=bin={{.ROOT_DIR}}/{{.BINFILE}}
        --var=fix={{.ROOT_DIR}}/tst/integration/fixtures
        --output-dir=$PWD/results
        --stop-on-failure

  snapshot:
    cmds:
      - GITLAB_TOKEN="" goreleaser --clean --snapshot
    
  release:
    cmds:
      - GITLAB_TOKEN="" goreleaser --clean
