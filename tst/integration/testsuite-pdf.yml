  - name: margin in centimeters
    steps:
      - type: exec
        script: '{{.bin}} --format=pdf --margin=2.54cm {{.fix}}/simple/headings.md {{.out}}/mcm.pdf && head -c 5 {{.out}}/mcm.pdf | grep -q "%PDF-" && echo OK'
