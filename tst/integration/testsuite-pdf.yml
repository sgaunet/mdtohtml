  - name: markdown with embedded image renders to a valid PDF
    steps:
      - type: exec
        script: '{{.bin}} --format=pdf {{.fix}}/images/img.md {{.out}}/img.pdf && head -c 5 {{.out}}/img.pdf | grep -q "%PDF-" && tail -c 6 {{.out}}/img.pdf | grep -q "%%EOF" && echo OK'
