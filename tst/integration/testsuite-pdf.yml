        script: '{{.bin}} --format=pdf {{.fix}}/code/inline.md {{.out}}/inline.pdf && head -c 5 {{.out}}/inline.pdf | grep -q "%PDF-" && tail -c 6 {{.out}}/inline.pdf | grep -q "%%EOF" && echo OK'
